name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Validate Plan presets
        run: node scripts/validate-plan-presets.mjs
